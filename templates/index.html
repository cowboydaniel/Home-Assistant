<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeAssistant</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --header-bg-color: #0078d4;
            --button-bg-color: #0078d4;
            --button-hover-bg-color: #005cb2;
            --response-bg-color: #e0e0e0;
            --panel-bg-color: #ffffff;
            --muted-text-color: #606060;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f4f4f9;
            --header-bg-color: #1f1f1f;
            --button-bg-color: #6200ea;
            --button-hover-bg-color: #3700b3;
            --response-bg-color: #333333;
            --panel-bg-color: #1f1f1f;
            --muted-text-color: #bdbdbd;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
        }

        header {
            background-color: var(--header-bg-color);
            color: white;
            padding: 10px 0;
            margin-bottom: 20px;
            position: relative;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: left;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--button-bg-color);
            background-color: transparent;
            color: var(--text-color);
            cursor: pointer;
            font-weight: 600;
        }

        .tab-btn.active {
            background-color: var(--button-bg-color);
            color: #fff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        input[type="text"] {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 10px;
            margin: 10px 0;
            background-color: var(--button-bg-color);
            color: white;
            border: none;
            cursor: pointer;
            width: auto;
            border-radius: 6px;
        }

        button:hover {
            background-color: var(--button-hover-bg-color);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .response {
            margin-top: 20px;
            padding: 10px;
            background-color: var(--response-bg-color);
            border-radius: 5px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .toggle-btn {
            background-color: transparent;
            border: none;
            color: white;
            font-size: 18px;
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
        }

        .typing-cursor::after {
            content: "▋";
            animation: blink 1s infinite;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .metric-card,
        .control-card {
            background: var(--panel-bg-color);
            border: 1px solid rgba(127, 127, 127, 0.25);
            border-radius: 10px;
            padding: 12px;
        }

        .metric-card.clickable {
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .metric-card.clickable:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
        }

        .metric-label,
        .control-title {
            margin: 0 0 6px;
            font-size: 14px;
            color: var(--muted-text-color);
        }

        .metric-value {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
        }

        .control-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status-text {
            margin-top: 8px;
            font-size: 13px;
            color: var(--muted-text-color);
        }

        .graph-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .graph-modal.open {
            display: flex;
        }

        .graph-modal-content {
            width: min(980px, 95vw);
            max-height: 92vh;
            overflow: auto;
            background: var(--panel-bg-color);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(127, 127, 127, 0.25);
        }

        .graph-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .graph-toolbar select {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            background: transparent;
            color: var(--text-color);
        }

        .graph-close {
            margin: 0;
        }

        .graph-svg {
            width: 100%;
            height: 520px;
            border-radius: 10px;
            background: rgba(127, 127, 127, 0.08);
            border: 1px solid rgba(127, 127, 127, 0.25);
        }

        .graph-axis {
            stroke: var(--muted-text-color);
            stroke-width: 1;
        }

        .graph-tick {
            stroke: rgba(127, 127, 127, 0.3);
            stroke-width: 1;
        }

        .graph-line {
            fill: none;
            stroke: #4ea1ff;
            stroke-width: 3;
        }

        .graph-point {
            fill: #7fb9ff;
        }

        .graph-label {
            fill: var(--text-color);
            font-size: 12px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body class="dark-mode">
    <header>
        <h1>HomeAssistant</h1>
        <button class="toggle-btn" id="toggleBtn">Switch to Light Mode</button>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="chatTab" onclick="switchTab('chatTab')">Chat</button>
            <button class="tab-btn" data-tab="controlTab" onclick="switchTab('controlTab')">Control</button>
        </div>

        <section id="chatTab" class="tab-content active">
            <h2>Chat with Assistant</h2>

            <input id="userInput" type="text" placeholder="Type your question here..." />

            <button id="sendBtn" onclick="sendMessage()">Send</button>
            <button onclick="newChat()">New Chat</button>

            <div class="action-buttons">
                <button onclick="restartService()">Restart Service</button>
            </div>

            <div class="response" id="responseBox"></div>

            <div id="notification" style="display:none; background-color: #f39c12; padding: 10px; color: white; margin-top: 10px;">
                Service restarted successfully!
            </div>
        </section>

        <section id="controlTab" class="tab-content">
            <h2>Control Panel</h2>

            <div class="control-grid">
                <div
                    class="metric-card clickable"
                    role="button"
                    tabindex="0"
                    aria-label="Open water usage graph"
                    onclick="openWaterUsageGraph()"
                    onkeydown="handleWaterUsagePaneKeydown(event)"
                >
                    <p class="metric-label">Water Usage</p>
                    <p class="metric-value" id="waterUsage">-- L</p>
                </div>
                <div
                    class="metric-card clickable"
                    role="button"
                    tabindex="0"
                    aria-label="Open electricity usage graph"
                    onclick="openUsageGraph('electricity')"
                    onkeydown="handleUsagePaneKeydown(event, 'electricity')"
                >
                    <p class="metric-label">Electricity Usage</p>
                    <p class="metric-value" id="electricityUsage">-- kWh</p>
                </div>
                <div class="metric-card">
                    <p class="metric-label">Weather</p>
                    <p class="metric-value" id="weatherInfo">Loading...</p>
                </div>
            </div>

            <div class="control-grid">
                <div class="control-card">
                    <p class="control-title">Cameras</p>
                    <div class="control-actions">
                        <button onclick="setDeviceState('camera', 'On')">Turn On</button>
                        <button onclick="setDeviceState('camera', 'Off')">Turn Off</button>
                    </div>
                    <div class="status-text" id="cameraStatus">Status: --</div>
                </div>

                <div class="control-card">
                    <p class="control-title">Lights</p>
                    <div class="control-actions">
                        <button onclick="setDeviceState('light', 'On')">Turn On</button>
                        <button onclick="setDeviceState('light', 'Off')">Turn Off</button>
                    </div>
                    <div class="status-text" id="lightStatus">Status: --</div>
                </div>

                <div class="control-card">
                    <p class="control-title">Locks</p>
                    <div class="control-actions">
                        <button onclick="setDeviceState('lock', 'Locked')">Lock</button>
                        <button onclick="setDeviceState('lock', 'Unlocked')">Unlock</button>
                    </div>
                    <div class="status-text" id="lockStatus">Status: --</div>
                </div>
            </div>
        </section>
    </div>

    <div class="graph-modal" id="usageModal" aria-hidden="true">
        <div class="graph-modal-content" role="dialog" aria-modal="true" aria-label="Usage graph">
            <div class="graph-toolbar">
                <label for="usageRange" id="usageRangeLabel">Daily water usage range:</label>
                <select id="usageRange">
                    <option value="week">Week</option>
                    <option value="month">Month</option>
                    <option value="quarter">Quarter</option>
                    <option value="year">Year</option>
                </select>
                <button class="graph-close" type="button" onclick="closeWaterUsageGraph()">Close</button>
            </div>
            <svg id="usageChart" class="graph-svg" viewBox="0 0 920 520" role="img" aria-label="Daily usage chart"></svg>
        </div>
    </div>

    <script>
        const CHAT_STORAGE_KEY = "homeassistant.chat.v1";
        let chatTranscript = loadChatTranscript();
        let activeAssistantMessageIndex = null;

        function loadChatTranscript() {
            const storedTranscript = localStorage.getItem(CHAT_STORAGE_KEY);
            if (!storedTranscript) {
                return [];
            }

            try {
                const parsedTranscript = JSON.parse(storedTranscript);
                if (!Array.isArray(parsedTranscript)) {
                    throw new Error("Transcript is not an array.");
                }

                const normalizedTranscript = parsedTranscript.map((message) => {
                    if (
                        !message ||
                        (message.role !== "user" && message.role !== "assistant") ||
                        typeof message.content !== "string"
                    ) {
                        throw new Error("Transcript entry is invalid.");
                    }

                    return {
                        role: message.role,
                        content: message.content
                    };
                });

                return normalizedTranscript;
            } catch (error) {
                console.warn("Invalid chat transcript in localStorage. Resetting.", error);
                localStorage.removeItem(CHAT_STORAGE_KEY);
                return [];
            }
        }

        function saveChatTranscript() {
            localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chatTranscript));
        }

        function renderChatTranscript() {
            const responseBox = document.getElementById("responseBox");
            responseBox.innerHTML = chatTranscript.map((message, index) => {
                const speaker = message.role === "user" ? "You" : "Assistant";
                const typingClass = index === activeAssistantMessageIndex ? " typing-cursor" : "";
                return `<b>${speaker}:</b> <span class="chat-line${typingClass}">${escapeHtml(message.content)}</span><br><br>`;
            }).join("");
            responseBox.scrollTop = responseBox.scrollHeight;
        }

        function appendChatMessage(role, content = "") {
            chatTranscript.push({ role, content });
            renderChatTranscript();
            saveChatTranscript();
            return chatTranscript.length - 1;
        }

        function setChatMessageContent(index, content, isTyping = false) {
            if (typeof index !== "number" || !chatTranscript[index]) {
                return;
            }

            chatTranscript[index].content = content;
            activeAssistantMessageIndex = isTyping ? index : null;
            renderChatTranscript();
            saveChatTranscript();
        }

        function hydrateChatFromStorage() {
            activeAssistantMessageIndex = null;
            renderChatTranscript();
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const sendBtn = document.getElementById("sendBtn");

            const userInput = input.value.trim();
            if (!userInput) return;

            sendBtn.disabled = true;
            input.value = "";

            appendChatMessage("user", userInput);
            const assistantMessageIndex = appendChatMessage("assistant", "");
            let assistantMessage = "";
            setChatMessageContent(assistantMessageIndex, assistantMessage, true);

            try {
                const res = await fetch("/chat_stream", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ input: userInput })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    const events = buffer.split("\n\n");
                    buffer = events.pop();

                    for (const event of events) {
                        if (!event.startsWith("data: ")) continue;

                        const jsonText = event.replace("data: ", "").trim();
                        if (!jsonText) continue;

                        const data = JSON.parse(jsonText);

                        if (data.chunk) {
                            assistantMessage += data.chunk;
                            setChatMessageContent(assistantMessageIndex, assistantMessage, true);
                        }

                        if (data.error) {
                            assistantMessage += `[ERROR] ${data.error}`;
                            setChatMessageContent(assistantMessageIndex, assistantMessage, true);
                        }

                        if (data.done) {
                            setChatMessageContent(assistantMessageIndex, assistantMessage, false);
                        }
                    }
                }

                setChatMessageContent(assistantMessageIndex, assistantMessage, false);

            } catch (error) {
                assistantMessage += `[ERROR] ${error}`;
                setChatMessageContent(assistantMessageIndex, assistantMessage, false);
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function newChat() {
            chatTranscript = [];
            activeAssistantMessageIndex = null;
            document.getElementById("responseBox").innerHTML = "";
            document.getElementById("userInput").value = "";
            localStorage.removeItem(CHAT_STORAGE_KEY);
        }

        async function restartService() {
            try {
                const res = await fetch("/restart", {
                    method: "POST"
                });

                const data = await res.json();
                alert(data.message || "Restart requested.");

                const notification = document.getElementById("notification");
                notification.style.display = "block";

                setTimeout(() => {
                    notification.style.display = "none";
                }, 3000);

            } catch (error) {
                alert("Error restarting service: " + error);
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll(".tab-content").forEach((tab) => {
                tab.classList.remove("active");
            });

            document.querySelectorAll(".tab-btn").forEach((tabBtn) => {
                tabBtn.classList.remove("active");
            });

            document.getElementById(tabId).classList.add("active");
            document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add("active");

            if (tabId === "controlTab") {
                fetchControlState();
            }
        }

        async function fetchControlState() {
            try {
                const res = await fetch("/control/state");
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Failed to load control state.");
                }

                document.getElementById("waterUsage").textContent = `${data.metrics.water_usage_litres} L`;
                document.getElementById("electricityUsage").textContent = `${data.metrics.electricity_usage_kwh} kWh`;
                document.getElementById("weatherInfo").textContent = data.metrics.weather;

                document.getElementById("cameraStatus").textContent = `Status: ${data.devices.camera}`;
                document.getElementById("lightStatus").textContent = `Status: ${data.devices.light}`;
                document.getElementById("lockStatus").textContent = `Status: ${data.devices.lock}`;
            } catch (error) {
                console.error("Control state error:", error);
                document.getElementById("weatherInfo").textContent = "Offline";
            }
        }

        async function setDeviceState(deviceType, state) {
            const statusMap = {
                camera: "cameraStatus",
                light: "lightStatus",
                lock: "lockStatus"
            };

            try {
                const res = await fetch("/control/device", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        device: deviceType,
                        state
                    })
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || "Failed to update device state.");
                }

                const statusElement = document.getElementById(statusMap[deviceType]);
                if (statusElement) {
                    statusElement.textContent = `Status: ${data.state}`;
                }
            } catch (error) {
                alert(`Control update failed: ${error.message}`);
            }
        }

        let activeUsageType = "water";

        function openWaterUsageGraph() {
            openUsageGraph("water");
        }

        function openUsageGraph(usageType) {
            activeUsageType = usageType;
            const modal = document.getElementById("usageModal");
            const label = document.getElementById("usageRangeLabel");
            const chart = document.getElementById("usageChart");

            label.textContent = usageType === "electricity"
                ? "Daily electricity usage range:"
                : "Daily water usage range:";
            chart.setAttribute(
                "aria-label",
                usageType === "electricity" ? "Daily electricity usage chart" : "Daily water usage chart"
            );

            modal.classList.add("open");
            modal.setAttribute("aria-hidden", "false");
            drawUsageChart(document.getElementById("usageRange").value, usageType);
        }

        function handleWaterUsagePaneKeydown(event) {
            handleUsagePaneKeydown(event, "water");
        }

        function handleUsagePaneKeydown(event, usageType) {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                openUsageGraph(usageType);
            }
        }

        function closeWaterUsageGraph() {
            const modal = document.getElementById("usageModal");
            modal.classList.remove("open");
            modal.setAttribute("aria-hidden", "true");
        }

        function generateUsageSeries(days, usageType) {
            const points = [];
            let base = usageType === "electricity" ? 34 : 200;
            for (let i = 0; i < days; i += 1) {
                const drift = usageType === "electricity" ? 0.7 : 8;
                const seasonalFactor = usageType === "electricity" ? 1.8 : 10;
                const noiseFactor = usageType === "electricity" ? 1.5 : 14;
                const minimum = usageType === "electricity" ? 8 : 70;

                base += (Math.random() - 0.5) * drift;
                const seasonal = Math.sin(i / 10) * seasonalFactor;
                const noise = (Math.random() - 0.5) * noiseFactor;
                const value = base + seasonal + noise;
                points.push(usageType === "electricity" ? Number(Math.max(minimum, value).toFixed(1)) : Math.round(Math.max(minimum, value)));
            }
            return points;
        }

        function drawUsageChart(range, usageType = activeUsageType) {
            const config = {
                week: { days: 7, labelEvery: 1 },
                month: { days: 30, labelEvery: 5 },
                quarter: { days: 90, labelEvery: 15 },
                year: { days: 365, labelEvery: 60 }
            };

            const { days, labelEvery } = config[range] || config.week;
            const values = generateUsageSeries(days, usageType);
            const chart = document.getElementById("usageChart");
            const unit = usageType === "electricity" ? "kWh" : "L";

            const width = 920;
            const height = 520;
            const margin = { top: 20, right: 20, bottom: 45, left: 52 };
            const plotWidth = width - margin.left - margin.right;
            const plotHeight = height - margin.top - margin.bottom;
            const minY = Math.min(...values);
            const maxY = Math.max(...values);
            const yPadding = Math.max(8, Math.round((maxY - minY) * 0.12));
            const yMin = minY - yPadding;
            const yMax = maxY + yPadding;

            const xScale = (i) => margin.left + (i / (days - 1)) * plotWidth;
            const yScale = (v) => margin.top + (1 - (v - yMin) / (yMax - yMin)) * plotHeight;

            const pathD = values
                .map((v, i) => `${i === 0 ? "M" : "L"} ${xScale(i).toFixed(2)} ${yScale(v).toFixed(2)}`)
                .join(" ");

            let ticks = "";
            for (let t = 0; t <= 4; t += 1) {
                const yVal = yMin + ((yMax - yMin) * t) / 4;
                const y = yScale(yVal);
                ticks += `<line class="graph-tick" x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" />`;
                ticks += `<text class="graph-label" x="8" y="${y + 4}">${yVal.toFixed(usageType === "electricity" ? 1 : 0)} ${unit}</text>`;
            }

            const xLabels = [];
            for (let i = 0; i < days; i += labelEvery) {
                xLabels.push(i);
            }
            if (xLabels[xLabels.length - 1] !== days - 1) {
                xLabels.push(days - 1);
            }

            let labels = "";
            xLabels.forEach((i) => {
                const x = xScale(i);
                labels += `<text class="graph-label" x="${x}" y="${height - 12}" text-anchor="middle">Day ${i + 1}</text>`;
            });

            const pointStep = Math.max(1, Math.floor(days / 30));
            let points = "";
            for (let i = 0; i < days; i += pointStep) {
                points += `<circle class="graph-point" cx="${xScale(i)}" cy="${yScale(values[i])}" r="2.6"></circle>`;
            }
            if ((days - 1) % pointStep !== 0) {
                points += `<circle class="graph-point" cx="${xScale(days - 1)}" cy="${yScale(values[days - 1])}" r="2.6"></circle>`;
            }

            chart.innerHTML = `
                <line class="graph-axis" x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${height - margin.bottom}" />
                <line class="graph-axis" x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" />
                ${ticks}
                <path class="graph-line" d="${pathD}" />
                ${points}
                ${labels}
            `;
        }

        document.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && document.getElementById("chatTab").classList.contains("active")) {
                event.preventDefault();
                sendMessage();
            }

            if (event.key === "Escape" && document.getElementById("usageModal").classList.contains("open")) {
                closeWaterUsageGraph();
            }
        });

        document.getElementById("usageRange").addEventListener("change", (event) => {
            drawUsageChart(event.target.value, activeUsageType);
        });

        document.getElementById("usageModal").addEventListener("click", (event) => {
            if (event.target.id === "usageModal") {
                closeWaterUsageGraph();
            }
        });

        const toggleBtn = document.getElementById("toggleBtn");
        const body = document.body;

        toggleBtn.addEventListener("click", () => {
            body.classList.toggle("dark-mode");

            if (body.classList.contains("dark-mode")) {
                toggleBtn.textContent = "Switch to Light Mode";
            } else {
                toggleBtn.textContent = "Switch to Dark Mode";
            }
        });

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        hydrateChatFromStorage();
        fetchControlState();
    </script>
</body>
</html>
